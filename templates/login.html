{% extends "base.html" %}

{% block layout %}
<div class="flex min-h-full flex-col justify-center py-12 sm:px-6 lg:px-8">
  <div class="sm:mx-auto sm:w-full sm:max-w-md">
    <h2 class="mt-6 text-center text-3xl font-bold tracking-tight text-slate-900">Award Tracker</h2>
    <p class="mt-2 text-center text-sm text-slate-600">
      Please unlock with your master password
    </p>
  </div>

  <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
    <div class="bg-white py-8 px-4 shadow sm:rounded-lg sm:px-10">
      
      <!-- Flash messages -->
      {% with messages = get_flashed_messages() %}
        {% if messages %}
          {% for message in messages %}
          <div class="rounded-md bg-red-50 p-4 mb-4">
            <div class="flex">
              <div class="ml-3">
                <h3 class="text-sm font-medium text-red-800">{{ message }}</h3>
              </div>
            </div>
          </div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      <form class="space-y-6" action="{{ url_for('login') }}" method="POST">
        <div>
          <label for="master_password" class="block text-sm font-medium leading-6 text-slate-900">Master Password</label>
          <div class="mt-2">
            <input id="master_password" name="master_password" type="password" required class="block w-full rounded-md border-0 py-1.5 px-3 text-slate-900 shadow-sm ring-1 ring-inset ring-slate-300 placeholder:text-slate-400 focus:ring-2 focus:ring-inset focus:ring-primary sm:text-sm sm:leading-6">
          </div>
        </div>

        <div>
          <button type="submit" class="flex w-full justify-center rounded-md bg-primary py-2 px-3 text-sm font-semibold text-white shadow-sm hover:bg-blue-400 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-primary">Unlock</button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
